workflows:
  android-call-log-generator:
    name: Android 通话生成APP
    instance_type: mac_mini_m1
    max_build_duration: 30
    environment:
      vars:
        EXPO_NO_DOCTOR: "1"
      node: 18
    scripts:
      - name: 安装依赖
        script: |
          npm install -g pnpm
          pnpm install
      - name: Expo 预编译
        script: npx expo prebuild --platform android --clean
      - name: 构建 APK
        script: |
          cd android
          ./gradlew assembleRelease
      - name: 复制产物
        script: |
          mkdir -p build/outputs
          cp android/app/build/outputs/apk/release/app-release.apk build/outputs/通话生成.apk
    artifacts:
      - build/outputs/*.apk
