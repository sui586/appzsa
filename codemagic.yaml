workflows:
  android-release:
    name: 通话生成 - Android APK
    max_build_duration: 60
    instance_type: mac_mini_m2  # 使用 M2 构建机，速度快

    environment:
      node: 20.17.0   # Expo 55 推荐 Node 20
      java: 17        # React Native 0.83 需要 Java 17

    scripts:
      - name: 安装 npm 依赖
        script: |
          npm install

      - name: Expo Prebuild（生成 Android 原生工程）
        script: |
          npx expo prebuild --platform android --no-install --clean
        env:
          EXPO_NO_DOTENV: "1"

      - name: 配置 gradlew 执行权限
        script: chmod +x android/gradlew

      - name: 构建 Release APK
        script: |
          cd android
          ./gradlew assembleRelease \
            -Dorg.gradle.jvmargs="-Xmx4g -XX:MaxMetaspaceSize=1g" \
            --no-daemon \
            --stacktrace

    artifacts:
      # 收集 APK 产物（可直接下载安装）
      - android/app/build/outputs/apk/release/*.apk
      # 同时收集构建日志（方便排错）
      - android/app/build/outputs/logs/**

    publishing:
      email:
        recipients:
          - your@email.com   # ← 替换成您的邮箱
        notify:
          success: true   # 构建成功时发邮件
          failure: true   # 构建失败时发邮件
